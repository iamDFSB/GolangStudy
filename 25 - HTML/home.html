<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <h1 style="display: none;" class="user">Hello Home {{.Nome}}</h1>
     <!-- <marquee> -->
         <!-- <p>Send a Message</p> -->
     <!-- </marquee> -->
     <h3 style="display: none;"  class="user">Meu email é {{.Email}}</h3>
     <button id="PrintButton">Print</button>
</body>
<script>
    const buttonPrint = document.getElementById("PrintButton");
    buttonPrint.addEventListener("click", (e) => {
        const userElements = document.getElementsByClassName("user");
        Array.from(userElements).forEach(element => {
            element.style.removeProperty("display");
        });
    })
</script>
</html>
